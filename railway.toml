# ── Railway deployment config (API Server) ───────────────────────────────────
#
# This project has TWO services, created separately in the Railway dashboard
# from the same GitHub repo.
#
# This railway.toml configures Service 1 (API Server) only.
# Service 2 (Discord Bot) is configured via Dashboard → Settings → Build/Deploy
# with its own overrides (NOT via this file):
#
#   Service 2 — Discord Bot
#     Build:  pnpm install --no-frozen-lockfile
#     Start:  pnpm --filter @workspace/discord-bot run start
#
# Required env vars for BOTH services:
#   DISCORD_TOKEN      — your bot token
#   APP_DOMAIN         — the Railway domain of Service 1 (e.g. my-api.up.railway.app)
#   VERIFICATIONS_FILE — absolute path on the shared volume (e.g. /data/verifications.json)
#
# Mount a Railway Volume on BOTH services at the same path (e.g. /data)
# so they share the same verifications.json file.
#
# Required env var for Service 1 only:
#   PORT               — Railway sets this automatically

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
